version: 2
updates:
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "sunday"
          time: "15:00"
      groups:
          all:
              patterns:
                  - "*"

    - package-ecosystem: "gradle"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "sunday"
          time: "15:00"
      groups:
          all:
              patterns:
                  - "*"
