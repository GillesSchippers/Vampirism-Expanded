plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.141'
    id 'idea'
    id 'me.modmuss50.mod-publish-plugin' version '1.1.0'
}

tasks.named('wrapper', Wrapper).configure {
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    srcDir('src/generated/resources')
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

repositories {
    exclusiveContent {
        forRepository {
            maven {
                url = "https://api.modrinth.com/maven"
            }
        }
        filter {
            includeGroup "maven.modrinth"
        }
    }

    exclusiveContent {
        forRepository {
            maven {
                url = "https://cursemaven.com"
            }
        }
        filter {
            includeGroup "curse.maven"
        }
    }

    maven {
        url = "https://maven.fallenbreath.me/releases"
    }

    maven {
        url = "https://maven.bawnorton.com/releases"
    }

    maven {
        url = "https://maven.maxanier.de/releases"
    }
}

base {
    archivesName = mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    runs {
        client {
            type = "client"
            devLogin = true
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            type = "server"
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            type = "data"
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        clientOffline {
            type = "client"
            devLogin = false
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        configureEach {
            systemProperty 'terminal.ansi', 'true'
            systemProperty 'terminal.keepMinecraftFormatting', 'true'
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

configurations {
    runtimeClasspath.extendsFrom(localRuntime)
}

dependencies {
    jarJar(implementation("com.github.bawnorton.mixinsquared:mixinsquared-neoforge:${mixinsquared_version}")) {
        version {
            strictly "${mixinsquared_version_range}"
            prefer "${mixinsquared_version}"
        }
    }

    jarJar(implementation("me.fallenbreath:conditional-mixin-neoforge:${conditional_mixin_version}")) {
        version {
            strictly "${conditional_mixin_version_range}"
            prefer "${conditional_mixin_version}"
        }
    }

    implementation("de.teamlapen.vampirism:Vampirism:${vampirism_version}") {
        exclude group: "mezz.jei", module: "jei-1.21-neoforge"
        exclude group: "de.maxanier.guideapi", module: "Guide-API-VP"
        exclude group: "com.github.glitchfiend", module: "TerraBlender-neoforge"
    }

    compileOnly(annotationProcessor("com.github.bawnorton.mixinsquared:mixinsquared-common:${mixinsquared_version}"))

    compileOnly("de.maxanier.guideapi:Guide-API-VP:${guideapi_version}") {
        exclude group: "mezz.jei", module: "jei-1.21-neoforge"
    }

    compileOnly("curse.maven:bloodlines-1073052:7965289") // TODO: Specify in gradle.properties

    localRuntime("curse.maven:bloodlines-1073052:7965289") // TODO: Specify in gradle.properties
    localRuntime("curse.maven:Guide-API-VP-380771:5618709") // TODO: Specify in gradle.properties
}

var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            neo_version             : neo_version,
            loader_version_range    : loader_version_range,
            minecraft_version       : minecraft_version,
            minecraft_version_range : minecraft_version_range,
            vampirism_version_range : vampirism_version_range,
            guideapi_version_range  : guideapi_version_range,
            bloodlines_version_range: bloodlines_version_range,
            mod_id                  : mod_id,
            mod_name                : mod_name,
            mod_license             : mod_license,
            mod_version             : mod_version,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}

sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

tasks.named('jar', Jar).configure {
    archiveFileName = "VampirismExpanded-${project.version}.jar"
}

def curseforgeToken = providers.environmentVariable("CURSEFORGE_TOKEN")
def curseforgeProjectId = providers.environmentVariable("CURSEFORGE_PROJECT_ID")

if (curseforgeToken.isPresent() && curseforgeProjectId.isPresent()) {
    def publishType = providers.environmentVariable("PUBLISH_TYPE").orElse("stable")
    def publishChangelog = providers.environmentVariable("PUBLISH_CHANGELOG").orElse("Manual workflow_dispatch release")

    publishMods {
        file = tasks.named('jar', Jar).flatMap { it.archiveFile }
        changelog = publishChangelog.get()
        type = switch (publishType.get().toLowerCase(Locale.ROOT)) {
            case 'alpha' -> ALPHA
            case 'beta' -> BETA
            default -> STABLE
        }

        modLoaders.add("neoforge")

        curseforge {
            projectId = curseforgeProjectId.get()
            accessToken = curseforgeToken
            clientRequired = true
            serverRequired = true
            minecraftVersions.add(minecraft_version)
            javaVersions.add(JavaVersion.VERSION_21)
            requires("vampirism-become-a-vampire")
            optional("guide-api-village-and-pillage")
            optional("bloodlines")
        }
    }
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}

